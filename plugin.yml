name: Endor Labs
description: Run endorctl in Buildkite CI — SCA, SAST, secrets, containers, and policy gating for the Endor Labs platform
author: https://github.com/endorlabs
requirements:
  - bash
  - curl
configuration:
  properties:
    mode:
      type: string
      enum: [ "scan", "sign", "verify" ]
      default: "scan"
      description: >-
        Plugin operation. scan runs endorctl scan or container scan (default).
        sign and verify run artifact signing workflows; scan_* options are
        invalid in those modes. See the
        [endorctl scan command reference](https://docs.endorlabs.com/developers-api/cli/commands/scan) for more information.
    namespace:
      type: string
      description: >-
        Endor Labs tenant namespace for the project. Required. See the
        [endorctl scan command reference](https://docs.endorlabs.com/developers-api/cli/commands/scan) for more information.
    api:
      type: string
      description: >-
        Endor Labs API base URL (--api). Defaults to production when unset. See
        the [endorctl scan command reference](https://docs.endorlabs.com/developers-api/cli/commands/scan) for more information.
    api_key_env:
      type: string
      description: >-
        Name of a Buildkite secret env var holding the API key. The plugin
        exports ENDOR_API_CREDENTIALS_KEY from its value; never passes --api-key
        on the CLI. Use with api_secret_env. See the
        [plugin security guide](https://github.com/endorlabs/endorlabs-buildkite-plugin/blob/main/SECURITY.md)
        and [Buildkite cluster secrets](https://buildkite.com/docs/agent/v3/clusters/secrets) for more information.
    api_secret_env:
      type: string
      description: >-
        Name of a Buildkite secret env var holding the API secret. Exported as
        ENDOR_API_CREDENTIALS_SECRET. Required when api_key_env is set unless
        both credentials are pre-exported on the agent. See
        [Buildkite cluster secrets](https://buildkite.com/docs/agent/v3/clusters/secrets) for more information.
    aws_role_arn:
      type: string
      description: >-
        AWS keyless auth role ARN passed to endorctl as --aws-role-arn. Use on
        EC2/EKS agents with ambient AWS credentials (instance profile or IRSA).
        Mutually exclusive with API key auth. See
        [AWS keyless authentication](https://docs.endorlabs.com/setup-deployment/ci-cd/keyless-authentication/aws-keyless-auth) for more information.
    enable_azure_managed_identity:
      type: boolean
      default: false
      description: >-
        Enable Azure keyless auth via managed identity
        (--enable-azure-managed-identity). Mutually exclusive with API key auth.
        See [Azure keyless authentication](https://docs.endorlabs.com/setup-deployment/ci-cd/keyless-authentication/azure-keyless-auth) for more information.
    gcp_service_account:
      type: string
      description: >-
        GCP keyless auth target service account passed as
        --gcp-service-account. Typically the Endor federation service account.
        Mutually exclusive with API key auth. See
        [Google Cloud keyless authentication](https://docs.endorlabs.com/setup-deployment/ci-cd/keyless-authentication/google-keyless-auth) for more information.
    scan_dependencies:
      type: boolean
      default: true
      description: >-
        Software composition analysis (SCA): analyze declared and reachable
        dependencies (--dependencies=true). Default true. At least one scan kind
        must be enabled in mode=scan. See
        [software composition analysis](https://docs.endorlabs.com/scan/sca) for more information.
    scan_secrets:
      type: boolean
      default: false
      description: >-
        Scan the repository for exposed secrets (--secrets=true). Often paired
        with scan_dependencies in CI. See
        [secrets detection](https://docs.endorlabs.com/scan/secrets) for more information.
    scan_sast:
      type: boolean
      default: false
      description: >-
        Static application security testing (--sast=true). See
        [SAST scanning](https://docs.endorlabs.com/scan/sast) for more information.
    scan_git_logs:
      type: boolean
      default: false
      description: >-
        Deep secret scan of full git history (--git-logs=true). Requires
        scan_secrets=true. See
        [scanning for secrets](https://docs.endorlabs.com/scan/secrets/scan-secrets) for more information.
    scan_github_actions:
      type: boolean
      default: false
      description: >-
        Analyze GitHub Actions workflows referenced in the repo for vulnerable
        or malicious actions (--ghactions=true). See
        [GitHub Actions scanning](https://docs.endorlabs.com/scan/github-actions) for more information.
    scan_ai_models:
      type: boolean
      default: false
      description: >-
        Detect AI model usage in the codebase (--ai-models=true). Requires
        scan_dependencies=true. See
        [AI model detection](https://docs.endorlabs.com/scan/ai-models) for more information.
    scan_tools:
      type: boolean
      default: false
      description: >-
        Inventory CI/CD and developer tools in the repository (--tools=true).
        See [scanning with Endor Labs](https://docs.endorlabs.com/scan) for more information.
    scan_package:
      type: boolean
      default: false
      description: >-
        Scan a built artifact or package at scan_path (--package=true). Requires
        project_name and scan_path; mutually exclusive with scan_dependencies,
        scan_secrets, scan_sast, and scan_container. See
        [scanning artifacts and binaries](https://docs.endorlabs.com/scan/sca/binary-artifact-scan) for more information.
    scan_container:
      type: boolean
      default: false
      description: >-
        Run endorctl container scan instead of repository scan. Requires image or
        image_tar; mutually exclusive with repository scan kinds — use a separate
        step. See
        [scanning containers with endorctl](https://docs.endorlabs.com/scan/containers/scan-containers-using-endorctl) for more information.
    phantom_dependencies:
      type: boolean
      default: false
      description: >-
        Detect dependencies used in source but not declared in manifest files
        (--phantom-dependencies=true). Used with SCA reachability. See
        [phantom dependencies](https://docs.endorlabs.com/scan/sca/reachability-analysis#phantom-dependencies) for more information.
    disable_code_snippet_storage:
      type: boolean
      default: false
      description: >-
        Do not store or display source snippets for findings
        (--disable-code-snippet-storage=true). Requires scan_sast=true. See
        [SAST scanning](https://docs.endorlabs.com/scan/sast) for more information.
    use_bazel:
      type: boolean
      default: false
      description: >-
        Enable Bazel-aware scan (--use-bazel). Requires bazel on the agent PATH
        and a successful target prebuild in the step command; the plugin does not
        install Bazel. See
        [Bazel scanning](https://docs.endorlabs.com/scan/bazel) for more information.
    bazel_include_targets:
      type: string
      description: >-
        Comma-separated Bazel targets to include (--bazel-include-targets).
        Mutually exclusive with bazel_targets_query. See
        [Bazel scanning](https://docs.endorlabs.com/scan/bazel) for more information.
    bazel_exclude_targets:
      type: string
      description: >-
        Comma-separated Bazel targets to exclude (--bazel-exclude-targets). See
        [Bazel scanning](https://docs.endorlabs.com/scan/bazel) for more information.
    bazel_targets_query:
      type: string
      description: >-
        Bazel query for target discovery (--bazel-targets-query). Ignored when
        bazel_include_targets is set. See
        [Bazel scanning](https://docs.endorlabs.com/scan/bazel) for more information.
    scan_path:
      type: string
      description: >-
        Repository or artifact path to scan (--path). Defaults to the step
        working directory when unset. Required when scan_package=true.
    project_name:
      type: string
      description: >-
        Endor project name for container or package scans (--project-name).
        Required when scan_package=true; optional for container scans.
    image:
      type: string
      description: >-
        Container image reference to scan (--image), e.g. alpine:3.19. Required
        for scan_container unless image_tar is set. Mutually exclusive with
        image_tar. See
        [scanning containers with endorctl](https://docs.endorlabs.com/scan/containers/scan-containers-using-endorctl) for more information.
    image_tar:
      type: string
      description: >-
        Path to a saved container image tarball (--image-tar). Alternative to
        image for air-gapped or pre-exported images. See
        [scanning containers with endorctl](https://docs.endorlabs.com/scan/containers/scan-containers-using-endorctl) for more information.
    as_ref:
      type: boolean
      default: false
      description: >-
        Persist container scan context as a version ref (--as-ref). Container
        scans only. See
        [scanning containers with endorctl](https://docs.endorlabs.com/scan/containers/scan-containers-using-endorctl) for more information.
    os_reachability:
      type: boolean
      default: false
      description: >-
        Enable OS package reachability for container scans (--os-reachability).
        See [container reachability](https://docs.endorlabs.com/scan/containers/container-reachability) for more information.
    project_tags:
      type: string
      description: >-
        Comma-separated tags on the container scan project (--project-tags). See
        [scanning containers with endorctl](https://docs.endorlabs.com/scan/containers/scan-containers-using-endorctl) for more information.
    container_scan_path:
      type: string
      default: "."
      description: >-
        Git repository path for container scan context (--path on container scan).
        Associate container results with an existing SCA project when it matches
        the SCA scan_path. See
        [scanning containers with endorctl](https://docs.endorlabs.com/scan/containers/scan-containers-using-endorctl) for more information.
    profiling_data_dir:
      type: string
      description: >-
        Directory of runtime profiling data to include in container reachability
        analysis (--profiling-data-dir). See
        [container reachability](https://docs.endorlabs.com/scan/containers/container-reachability) for more information.
    artifact_name:
      type: string
      description: >-
        Artifact identifier for sign/verify modes (--artifact-name). Required
        when mode is sign or verify. See
        [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    certificate_oidc_issuer:
      type: string
      description: >-
        OIDC issuer URL for artifact certificate identity (--certificate-oidc-issuer).
        Required when mode is sign or verify. See
        [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    certificate_identity:
      type: string
      description: >-
        Certificate identity subject for sign/verify (--certificate-identity). See
        [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    source_repository_ref:
      type: string
      description: >-
        Git ref of the source repository for signing (--source-repository-ref).
        Required when mode=sign. See
        [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    source_repository:
      type: string
      description: >-
        Source repository URL metadata for sign/verify (--source-repository). See
        [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    source_repository_owner:
      type: string
      description: >-
        Source repository owner for sign/verify (--source-repository-owner). See
        [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    source_repository_digest:
      type: string
      description: >-
        Source repository digest for sign/verify (--source-repository-digest). See
        [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    build_config_name:
      type: string
      description: >-
        Build configuration name for provenance (--build-config-name). Sign/verify.
        See [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    build_config_digest:
      type: string
      description: >-
        Build configuration digest for provenance (--build-config-digest). Sign/verify.
        See [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    runner_environment:
      type: string
      description: >-
        Runner environment label for provenance (--runner-environment). Sign/verify.
        See [artifact signing](https://docs.endorlabs.com/developers-api/cli/commands/sign-artifacts) for more information.
    endorctl_version:
      type: string
      description: >-
        Pin endorctl release version at install. When set, endorctl_checksum is
        required. When unset, installs latest from the API meta/version endpoint.
        See [installing and configuring endorctl](https://docs.endorlabs.com/developers-api/cli/install-and-configure) for more information.
    endorctl_checksum:
      type: string
      description: >-
        SHA-256 checksum of the pinned endorctl binary for the agent OS/arch.
        Required when endorctl_version is set. See
        [installing and configuring endorctl](https://docs.endorlabs.com/developers-api/cli/install-and-configure) for more information.
    endorctl_skip_install:
      type: boolean
      default: false
      description: >-
        Skip downloading endorctl; use the binary already on PATH. Useful on
        custom agent images with a preinstalled CLI. See
        [installing and configuring endorctl](https://docs.endorlabs.com/developers-api/cli/install-and-configure) for more information.
    log_level:
      type: string
      enum: [ "debug", "info", "warn", "error", "fatal" ]
      default: info
      description: >-
        endorctl log level (--log-level). Default info.
    log_verbose:
      type: boolean
      default: false
      description: >-
        Enable verbose endorctl logging (--verbose=true).
    output_type:
      type: string
      enum: [ "json", "yaml", "summary", "table" ]
      default: json
      description: >-
        Scan result format (--output-type). Use json for annotations and
        machine-readable artifacts. Default json.
    sarif_file:
      type: string
      description: >-
        Write findings to a SARIF file at this path (--sarif-file). Enables
        upload_artifacts when set.
    output_file:
      type: string
      description: >-
        Write scan JSON to this path (--output-file). Enables upload_artifacts
        and rich annotate tables when annotate=true (requires jq).
    tags:
      type: string
      description: >-
        Comma-separated scan tags for search and filtering (--tags).
    exit_on_policy_warning:
      type: boolean
      default: false
      description: >-
        Fail the step on policy warnings (--exit-on-policy-warning). Exit code
        129 when enabled. See
        [endorctl exit codes](https://docs.endorlabs.com/best-practices/troubleshooting/endorctl-exitcodes) for more information.
    annotate:
      type: boolean
      default: false
      description: >-
        Publish an HTML summary via buildkite-agent annotate after the scan.
        Includes severity counts, optional findings table, and artifact link.
        No code snippets in annotations. See
        [buildkite-agent annotate](https://buildkite.com/docs/agent/cli/reference/annotate) for more information.
    annotate_context:
      type: string
      description: >-
        Optional buildkite-agent annotate --context. Use a unique value per step
        when one build runs multiple plugin invocations (layered scans). When
        omitted, context is derived from mode (endorlabs-scan, endorlabs-container,
        endorlabs-sign, endorlabs-verify). See
        [buildkite-agent annotate](https://buildkite.com/docs/agent/cli/reference/annotate) for more information.
    annotate_scope:
      type: string
      enum: [ "build", "job" ]
      default: build
      description: >-
        Where the annotation appears in the Buildkite UI. Use job to show findings
        on the step job drawer (requires buildkite-agent v3.112+). Default build
        shows annotations on the build page. See
        [Buildkite annotations](https://buildkite.com/docs/pipelines/configure/annotations) for more information.
    annotate_findings_limit:
      type: integer
      default: -1
      description: >-
        Findings table rows: -1 = all critical and high only; 0 = severity counts
        with no table; N>0 = all critical/high plus up to N medium/low rows (by
        severity). Requires jq and JSON scan output.
    soft_fail:
      type: boolean
      default: false
      description: >-
        When true, convert non-zero endorctl exits to step success except exit 128
        while fail_on_policy is true (policy blocks still fail the step). See
        [endorctl exit codes](https://docs.endorlabs.com/best-practices/troubleshooting/endorctl-exitcodes) for more information.
    fail_on_policy:
      type: boolean
      default: true
      description: >-
        When false, treat endorctl exit 128 (blocking admission policy) as success.
        See [endorctl exit codes](https://docs.endorlabs.com/best-practices/troubleshooting/endorctl-exitcodes) for more information.
    upload_artifacts:
      type: boolean
      default: false
      description: >-
        Upload output_file, sarif_file, and artifact_paths via buildkite-agent
        after the scan. Auto-enabled when output_file or sarif_file is set. See
        [buildkite-agent artifact](https://buildkite.com/docs/agent/cli/reference/artifact) for more information.
    artifact_paths:
      type: string
      description: >-
        Comma-separated extra file paths to upload when upload_artifacts is true.
        See [buildkite-agent artifact](https://buildkite.com/docs/agent/cli/reference/artifact) for more information.
    pr:
      type: boolean
      description: >-
        When false, never enable PR scan flags even on pull-request builds
        (numeric BUILDKITE_PULL_REQUEST). When true or omitted, PR mode is
        enabled when Buildkite exposes a numeric pull request id, or when
        pr_baseline is set (explicit baseline implies a PR-style scan). See
        [PR scans](https://docs.endorlabs.com/scan/pr-scans) for more information.
    pr_baseline:
      type: string
      description: >-
        Git ref for the merge target (e.g. main). Overrides
        BUILDKITE_PULL_REQUEST_BASE_BRANCH when both are present. With
        enable_pr_comments, endorctl can infer the baseline from the PR unless
        you set this explicitly. See
        [PR scans](https://docs.endorlabs.com/scan/pr-scans) for more information.
    pr_incremental:
      type: boolean
      default: false
      description: >-
        Incremental PR scan (--pr-incremental=true). Requires a numeric
        BUILDKITE_PULL_REQUEST or pr_baseline, and baseline context via
        pr_baseline, BUILDKITE_PULL_REQUEST_BASE_BRANCH, or enable_pr_comments.
        See [PR scans](https://docs.endorlabs.com/scan/pr-scans) for more information.
    enable_pr_comments:
      type: boolean
      default: false
      description: >-
        Post findings as SCM review comments (--enable-pr-comments=true).
        Requires a pull-request build (numeric BUILDKITE_PULL_REQUEST), pr not
        false, and scm_token_env pointing to a non-empty token. See
        [PR comments](https://docs.endorlabs.com/scan/pr-scans/pr-comments) for more information.
    scm_token_env:
      type: string
      description: >-
        Name of an environment variable whose value is passed to endorctl as
        --scm-token when enable_pr_comments is true. The token value is never
        printed by the plugin. See
        [PR comments](https://docs.endorlabs.com/scan/pr-scans/pr-comments) for more information.
    additional_args:
      type: string
      description: >-
        Extra endorctl arguments appended verbatim (space-separated). Use for
        flags not yet exposed as plugin keys. See the
        [endorctl scan command reference](https://docs.endorlabs.com/developers-api/cli/commands/scan) for more information.
  required:
    - namespace
  additionalProperties: false
