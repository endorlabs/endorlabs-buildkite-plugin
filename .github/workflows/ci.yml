name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: |
            ./hooks
            ./lib
          additional_files: |
            scripts/validation/render-matrix.sh
            contrib/local-smoke/local-smoke.sh

  plugin-linter:
    name: Plugin linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint plugin schema and examples
        env:
          # buildkite/plugin-linter v3.0.0 (matches .buildkite plugin-linter image-version)
          PLUGIN_LINTER_IMAGE: buildkite/plugin-linter@sha256:6ad2532e7763eb9a2f9d8f1700b3424e0ec4310721d90e10026f7e3bdfd06cd2
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/plugin" \
            -w /plugin \
            "${PLUGIN_LINTER_IMAGE}" \
            --id endorlabs \
            --readme docs/examples.md

  bats:
    name: BATS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure hook scripts are executable
        run: chmod +x hooks/post-command

      - name: Run BATS in plugin-tester
        run: docker compose run --rm tests
