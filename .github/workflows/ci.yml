name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: |
            ./hooks
            ./lib
          additional_files: |
            scripts/phase7/run-repo-matrix.sh
            contrib/phase7-local/local-juice-shop.sh

  plugin-linter:
    name: Plugin linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint plugin schema and examples
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/plugin" \
            -w /plugin \
            buildkite/plugin-linter:latest \
            --id endorlabs \
            --readme docs/examples.md

  bats:
    name: BATS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure hook scripts are executable
        run: chmod +x hooks/post-command

      - name: Run BATS in plugin-tester
        run: docker compose run --rm tests
