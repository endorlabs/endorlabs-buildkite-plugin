name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: |
            ./hooks
            ./lib
          additional_files: |
            scripts/phase7/run-repo-matrix.sh
            contrib/phase7-local/local-juice-shop.sh

  plugin-linter:
    name: Plugin linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Lint plugin schema and examples
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/plugin" \
            -w /plugin \
            buildkite/plugin-linter:latest \
            --id endorlabs \
            --readme docs/examples.md

  bats:
    name: BATS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run BATS in plugin-tester
        run: docker compose run --rm tests
